<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0f14"/><stop offset="1" stop-color="#131a24"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="ph1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0ea5e9"/><stop offset=".5" stop-color="#f59e0b"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="ph2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
    <linearGradient id="ph3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
    <radialGradient id="glow" cx="85%" cy="0%" r="60%"><stop offset="0" stop-color="#10b981" stop-opacity=".18"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="880" height="480" fill="url(#bg)"/>
  <rect width="880" height="480" fill="url(#glow)"/>

  <!-- header -->
  <rect x="34" y="34" width="30" height="30" rx="8" fill="url(#acc)"/>
  <path d="M42 54l4-5 3 3 3-4 4 6z" fill="#fff"/><circle cx="45" cy="45" r="2" fill="#fff"/>
  <text x="76" y="50" fill="#e7ecf3" font-size="19" font-weight="700">SnapShrink</text>
  <text x="76" y="68" fill="#8b97a8" font-size="12">Compress images in your browser · nothing uploaded</text>
  <rect x="700" y="36" width="146" height="34" rx="17" fill="#161c26" stroke="#263041"/>
  <text x="773" y="58" fill="#e7ecf3" font-size="12.5" font-weight="600" text-anchor="middle">★ Star on GitHub</text>

  <!-- controls bar -->
  <rect x="34" y="92" width="812" height="66" rx="12" fill="#161c26" stroke="#263041"/>
  <text x="52" y="116" fill="#8b97a8" font-size="10" font-weight="700" letter-spacing="1">OUTPUT FORMAT</text>
  <rect x="52" y="124" width="150" height="26" rx="7" fill="#1c2330" stroke="#263041"/><text x="64" y="141" fill="#e7ecf3" font-size="12">WebP (smallest)</text>
  <text x="228" y="116" fill="#8b97a8" font-size="10" font-weight="700" letter-spacing="1">QUALITY <tspan fill="#34d399">80</tspan></text>
  <rect x="228" y="134" width="150" height="5" rx="3" fill="#1c2330"/><rect x="228" y="134" width="112" height="5" rx="3" fill="url(#acc)"/><circle cx="340" cy="136.5" r="7" fill="#34d399"/>
  <text x="404" y="116" fill="#8b97a8" font-size="10" font-weight="700" letter-spacing="1">MAX SIZE</text>
  <rect x="404" y="124" width="150" height="26" rx="7" fill="#1c2330" stroke="#263041"/><text x="416" y="141" fill="#e7ecf3" font-size="12">1080p · 1920px</text>
  <rect x="596" y="122" width="170" height="30" rx="8" fill="url(#acc)"/><text x="681" y="142" fill="#06231a" font-size="12.5" font-weight="700" text-anchor="middle">Download all (.zip)</text>
  <rect x="776" y="122" width="60" height="30" rx="8" fill="transparent" stroke="#263041"/><text x="806" y="142" fill="#e7ecf3" font-size="12.5" text-anchor="middle">Clear</text>

  <!-- summary -->
  <g>
    <rect x="34" y="172" width="196" height="52" rx="10" fill="#161c26" stroke="#263041"/><text x="132" y="200" fill="#e7ecf3" font-size="18" font-weight="800" text-anchor="middle" font-family="monospace">3</text><text x="132" y="216" fill="#8b97a8" font-size="9" text-anchor="middle" letter-spacing="1">IMAGES</text>
    <rect x="240" y="172" width="196" height="52" rx="10" fill="#161c26" stroke="#263041"/><text x="338" y="200" fill="#e7ecf3" font-size="18" font-weight="800" text-anchor="middle" font-family="monospace">6.4 MB</text><text x="338" y="216" fill="#8b97a8" font-size="9" text-anchor="middle" letter-spacing="1">ORIGINAL</text>
    <rect x="446" y="172" width="196" height="52" rx="10" fill="#161c26" stroke="#263041"/><text x="544" y="200" fill="#e7ecf3" font-size="18" font-weight="800" text-anchor="middle" font-family="monospace">612 KB</text><text x="544" y="216" fill="#8b97a8" font-size="9" text-anchor="middle" letter-spacing="1">COMPRESSED</text>
    <rect x="652" y="172" width="194" height="52" rx="10" fill="#161c26" stroke="#263041"/><text x="749" y="200" fill="#34d399" font-size="18" font-weight="800" text-anchor="middle" font-family="monospace">−90%</text><text x="749" y="216" fill="#8b97a8" font-size="9" text-anchor="middle" letter-spacing="1">SAVED</text>
  </g>

  <!-- cards -->
  <g>
    <!-- card 1 -->
    <rect x="34" y="240" width="262" height="206" rx="12" fill="#161c26" stroke="#263041"/>
    <rect x="34" y="240" width="262" height="112" rx="12" fill="url(#ph1)"/>
    <text x="50" y="382" fill="#e7ecf3" font-size="12.5" font-weight="600">sunset-4032.jpg</text>
    <text x="50" y="402" fill="#8b97a8" font-size="12" font-family="monospace">2.4 MB</text><text x="112" y="402" fill="#8b97a8" font-size="12">→</text><text x="128" y="402" fill="#e7ecf3" font-size="12" font-weight="700" font-family="monospace">198 KB</text>
    <rect x="228" y="391" width="52" height="16" rx="8" fill="#10b98126" stroke="#10b98150"/><text x="254" y="403" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">−92%</text>
    <rect x="50" y="414" width="230" height="6" rx="3" fill="#1c2330"/><rect x="50" y="414" width="211" height="6" rx="3" fill="url(#acc)"/>
    <rect x="50" y="428" width="230" height="0" />
  </g>
  <g>
    <!-- card 2 -->
    <rect x="309" y="240" width="262" height="206" rx="12" fill="#161c26" stroke="#263041"/>
    <rect x="309" y="240" width="262" height="112" rx="12" fill="url(#ph2)"/>
    <text x="325" y="382" fill="#e7ecf3" font-size="12.5" font-weight="600">portrait.png</text>
    <text x="325" y="402" fill="#8b97a8" font-size="12" font-family="monospace">3.1 MB</text><text x="387" y="402" fill="#8b97a8" font-size="12">→</text><text x="403" y="402" fill="#e7ecf3" font-size="12" font-weight="700" font-family="monospace">301 KB</text>
    <rect x="503" y="391" width="52" height="16" rx="8" fill="#10b98126" stroke="#10b98150"/><text x="529" y="403" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">−90%</text>
    <rect x="325" y="414" width="230" height="6" rx="3" fill="#1c2330"/><rect x="325" y="414" width="207" height="6" rx="3" fill="url(#acc)"/>
  </g>
  <g>
    <!-- card 3 -->
    <rect x="584" y="240" width="262" height="206" rx="12" fill="#161c26" stroke="#263041"/>
    <rect x="584" y="240" width="262" height="112" rx="12" fill="url(#ph3)"/>
    <text x="600" y="382" fill="#e7ecf3" font-size="12.5" font-weight="600">screenshot.png</text>
    <text x="600" y="402" fill="#8b97a8" font-size="12" font-family="monospace">0.9 MB</text><text x="662" y="402" fill="#8b97a8" font-size="12">→</text><text x="678" y="402" fill="#e7ecf3" font-size="12" font-weight="700" font-family="monospace">113 KB</text>
    <rect x="778" y="391" width="52" height="16" rx="8" fill="#10b98126" stroke="#10b98150"/><text x="804" y="403" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">−87%</text>
    <rect x="600" y="414" width="230" height="6" rx="3" fill="#1c2330"/><rect x="600" y="414" width="200" height="6" rx="3" fill="url(#acc)"/>
  </g>
</svg>
